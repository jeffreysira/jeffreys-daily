name: Jeffrey’s Daily (19:00)

on:
  # Tijdelijk: elke 15 min om te testen of schedules lopen
  schedule:
    - cron: "*/15 * * * *"

  # Handmatig kunnen starten
  workflow_dispatch: {}

  # Hack: forceer GitHub om workflow + schedule goed te registreren
  push:
    branches:
      - main

jobs:
  run-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run digest
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DIGEST_TO_EMAIL: ${{ secrets.DIGEST_TO_EMAIL }}
          DIGEST_FROM_EMAIL: ${{ secrets.DIGEST_FROM_EMAIL }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USER_AGENT: "jeffreys-daily/0.1"
        run: |
          python run_digest.py

name: Jeffrey’s Daily (19:00)

on:
  schedule:
    # GitHub Actions cron is in UTC.
    # 19:00 Europe/Amsterdam (CET, UTC+1) = 18:00 UTC
    # In zomertijd (CEST, UTC+2) wordt dit 17:00 UTC (1 uur eerder aanpassen).
    - cron: "0 18 * * *"
  workflow_dispatch: {}

jobs:
  run-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run digest
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DIGEST_TO_EMAIL: ${{ secrets.DIGEST_TO_EMAIL }}
          DIGEST_FROM_EMAIL: ${{ secrets.DIGEST_FROM_EMAIL }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USER_AGENT: "jeffreys-daily/0.1"
        run: |
          python run_digest.py
